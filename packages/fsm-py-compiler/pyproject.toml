[project]
name = "fsm-py-compiler"
version = "0.1.0"
description = "Python FSM compiler — loads fsm.json into DB and validates Python plugin implementations"
requires-python = ">=3.12"
dependencies = [
    "fsm-core-py-db",
    "jsonschema>=4.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fsm_py_compiler"]

[tool.hatch.build.targets.wheel.force-include]
"src/fsm_py_compiler/fsm.machine.schema.json" = "fsm_py_compiler/fsm.machine.schema.json"

[tool.uv.sources]
fsm-core-py-db = { path = "../../apps/fsm-core-py-db", editable = true }

[tool.uv]
dev-dependencies = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
