name: prek

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # prek.toml's deno-fmt / cargo-fmt hooks are language = "system": they call
      # `deno` / `cargo` directly, so the pinned toolchains must be on PATH. The
      # runner has cargo/rustfmt preinstalled but not Deno; install both pinned
      # versions (matching ci.yml) so the hooks resolve and format deterministically.
      - uses: denoland/setup-deno@909cc5acb0fdd60627fb858598759246509fa755 # v2.0.2
        with:
          deno-version: 2.8.1

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt && rustup default 1.95.0

      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
