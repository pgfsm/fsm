name: prek

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # prek.toml's deno-fmt / cargo-fmt hooks are language = "system": they call
      # `deno` / `cargo` directly, so the pinned toolchains must be on PATH.
      # Versions come from the repo pins, not this file: setup-toolchain installs
      # proto and runs `proto install` against the root .prototools (Deno), and
      # the bare `rustup toolchain install` reads the root rust-toolchain.toml
      # (Rust has no proto shims — proto delegates it to rustup).
      - uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup toolchain install

      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
