name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/${{ github.repository }}/blob/main/CLA.md
          branch: cla-signatures
          allowlist: nirajkashyap

          remote-organization-name: pgfsm
          remote-repository-name: fsm
          create-file-commit-message: 'docs: store CLA signatures'
          signed-commit-message: 'docs: $contributorName has signed the CLA in $owner/$repo#$pullRequestNo'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you must sign our Contributor License Agreement.

            Please sign the CLA by clicking the link below:

            > **[Sign the CLA]($document-url)**

            Once signed, re-trigger this check by commenting `recheck` on this PR.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
          lock-pullrequest-aftermerge: false
