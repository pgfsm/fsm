name: SBOM

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: write # needed to attach the SBOM as a release asset

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate CycloneDX SBOM
        # cdxgen walks all three ecosystems in one pass:
        # Deno (deno.lock), Node (packages/database-src), Rust (fsm_core extension).
        run: npx @cyclonedx/cdxgen@latest -r . -o bom.json
        env:
          FETCH_LICENSE: "true"

      - name: Scan SBOM for known CVEs (grype)
        # Fails the build on any High or Critical vulnerability.
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:bom.json --fail-on high

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bom
          path: bom.json
          if-no-files-found: error

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: bom.json

  # Feeds the SBOM into GitHub's dependency graph so Dependabot raises alerts on
  # vulnerable dependencies continuously — not just at build time (grype above).
  dependency-submission:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to submit a dependency snapshot
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Submit dependency snapshot
        uses: anchore/sbom-action@df80a981bc6edbc4e220a492d3cbe9f5547a6e75 # v0.17.9
        with:
          dependency-snapshot: true
