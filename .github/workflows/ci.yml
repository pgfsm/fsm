name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno:
    name: Deno (fmt · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: denoland/setup-deno@909cc5acb0fdd60627fb858598759246509fa755 # v2.0.2
        with:
          deno-version: 2.8.1

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      # DB-free unit suites only. The route/db integration tests
      # (apps/fsm-core-ts-hono-deno/routes, packages/fsm-core-db-ts,
      # apps/fsm-core-example) need a live Postgres + fsm_core extension and are
      # excluded until a service container is wired up.
      - name: Test (unit)
        run: deno test --allow-all packages/fsm-compiler-ts apps/fsm-core-ts-hono-deno/stoker-src

  rust:
    name: Rust (fmt · clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/database-src-extension/fsm_core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy && rustup default 1.95.0

      - name: Format check
        run: cargo fmt --all --check

      # pgrx crates gate their PG version behind a feature; clippy needs one selected.
      - name: Clippy
        run: cargo clippy --features pg15 --no-default-features -- -D warnings
