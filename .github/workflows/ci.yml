name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno:
    name: Deno (fmt · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Installs proto and runs `proto install` against the root .prototools,
      # so the Deno version is sourced from the repo pin, not hardcoded here.
      - uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true

      - name: Format check
        run: deno fmt --check

      # Non-blocking for now: the repo carries a ~541-issue lint backlog
      # (mostly no-explicit-any / no-unused-vars) that can't be safely bulk-fixed.
      # The deno-lint pre-commit hook is also disabled (see prek.toml); re-enable
      # both and flip `continue-on-error` to false once the backlog is cleared.
      - name: Lint
        run: deno lint
        continue-on-error: true

      # DB-free unit suites only. The route/db integration tests
      # (apps/fsm-core-ts-hono-deno/routes, packages/fsm-core-db-ts,
      # apps/fsm-core-example) need a live Postgres + fsm_core extension and are
      # excluded until a service container is wired up.
      # Non-blocking: 8 CLI exit-code tests in
      # packages/fsm-compiler-ts/test/cli.test.ts are currently red — remove
      # `continue-on-error` once they're fixed so tests gate merges again.
      - name: Test (unit)
        run: deno test --allow-all packages/fsm-compiler-ts apps/fsm-core-ts-hono-deno/stoker-src
        continue-on-error: true

  rust-fmt:
    name: Rust (fmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/database-src-extension/fsm_core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Version, profile, and components (rustfmt, clippy) come from the root
      # rust-toolchain.toml; a bare `rustup toolchain install` reads it, and
      # every later cargo invocation resolves it via rustup's upward search.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup toolchain install

      - name: Format check
        run: cargo fmt --all --check

  # Clippy is split from fmt because it alone needs the heavy pgrx toolchain
  # below (PG 15 headers, cargo-pgrx, pgrx init) — fmt fails fast in parallel.
  rust-clippy:
    name: Rust (clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/database-src-extension/fsm_core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup toolchain install

      # Caches the cargo registry and the crate's target dir, keyed on
      # Cargo.lock + rustc version. Must run after the toolchain install.
      - name: Cache cargo registry + target dir
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/database-src-extension/fsm_core

      # cargo-pgrx takes ~5 min to compile; cache the installed binary and
      # skip the install step on a hit. Key includes the pinned version so a
      # pgrx bump in Cargo.toml naturally invalidates it.
      - name: Cache cargo-pgrx binary
        id: cache-cargo-pgrx
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-0.18.1-${{ runner.os }}

      # pgrx's pg-sys build.rs generates bindings from a real PostgreSQL install,
      # so clippy/build need PG 15 dev headers + `cargo pgrx init` (writes
      # $PGRX_HOME/config.toml). Without it the build fails with
      # "config.toml not found. Have you run 'cargo pgrx init' yet?".
      # PG 15 isn't in ubuntu-latest's default repos (it ships PG 16), so pull it
      # from the official PostgreSQL APT (PGDG) repository.
      - name: Install PostgreSQL 15 dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-15 postgresql-server-dev-15 libclang-dev

      # cargo-pgrx must match the pinned pgrx = "=0.18.1" in Cargo.toml.
      - name: Install cargo-pgrx
        if: steps.cache-cargo-pgrx.outputs.cache-hit != 'true'
        run: cargo install --locked cargo-pgrx@0.18.1

      # Point pgrx at the system PG 15 (fast path — avoids compiling PG from source).
      - name: Init pgrx (system PG 15)
        run: cargo pgrx init --pg15 /usr/lib/postgresql/15/bin/pg_config

      # pgrx crates gate their PG version behind a feature; clippy needs one selected.
      - name: Clippy
        run: cargo clippy --features pg15 --no-default-features -- -D warnings
