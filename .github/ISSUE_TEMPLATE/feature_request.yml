name: "✨ Feature Request"
description: Propose a new capability or an improvement to the FSM framework.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape the project! A well-scoped problem statement is the most
        important part — the component and category fields drive automatic labeling.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched the existing issues and this has not been requested yet.
          required: true
        - label: This is a single, focused request (not a list of unrelated ideas).
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the framework would this change?
      options:
        - API server (apps/fsm-core-ts-hono-deno)
        - FSM compiler — TypeScript (packages/fsm-compiler-ts)
        - FSM compiler — Python (packages/fsm-compiler-py)
        - Database migrations / Supabase (packages/database-src)
        - PostgreSQL extension — Rust/pgrx (packages/database-src-extension)
        - DB client helpers — TypeScript (packages/fsm-core-db-ts)
        - DB client helpers — Python (apps/fsm-core-db-py)
        - Worker / queue (pgmq, fsmworker)
        - Logging (@pgfsm/logging)
        - Example FSM definitions (apps/fsm-core-example)
        - Documentation
        - Other / unsure
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of change is this?
      options:
        - New feature
        - Improvement to existing behavior
        - Performance
        - Developer experience / tooling
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Describe the use case, not the implementation.
      placeholder: |
        As an operator of worker-based FSMs, I have no way to observe queue depth per FSM type,
        so I can't tell when workers are falling behind...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How you imagine it working — API shape, schema changes, new PG functions, CLI flags, etc.
      placeholder: |
        Add a GET /fsmworker/queue-stats route that wraps a new
        get_queue_stats_from_fsm_type_v2 PG function...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they fall short (including workarounds you use today).
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking change?
      description: Would this change existing FSM definitions, PG function signatures, or API routes in a non-backward-compatible way?
      options:
        - "No — purely additive"
        - "Yes — breaking change"
        - "Unsure"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this (see CONTRIBUTING.md).
          required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links, prior art (e.g., XState, Temporal, pgmq patterns), diagrams, or anything else.
    validations:
      required: false
